<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: visible;
}
#shadow {
  position: fixed;
  inset: 20px;
  border-radius: 10px;
  box-shadow: 0 0 0 0.5px rgba(0,0,0,0.12),
              0 8px 28px rgba(0,0,0,0.32),
              0 3px 10px rgba(0,0,0,0.20);
  pointer-events: none;
}
</style>
</head>
<body>
<div id="shadow"></div>
</body>
</html>
