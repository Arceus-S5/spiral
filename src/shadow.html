<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: transparent; pointer-events: none; }
#bg { position: fixed; inset: 0; background: #ffffff; }
body.dark #bg { background: #000000; }
#shadow {
  position: fixed; inset: 20px; border-radius: 10px;
  box-shadow: 0 0 0 0.5px rgba(0,0,0,0.12),
              0 8px 28px rgba(0,0,0,0.32),
              0 3px 10px rgba(0,0,0,0.20);
}
</style>
</head>
<body>
<div id="bg"></div>
<div id="shadow"></div>
<script>
const { ipcRenderer } = require('electron');
ipcRenderer.on('theme:changed', (e, dark) => {
  document.body.classList.toggle('dark', dark);
});
</script>
</body>
</html>
